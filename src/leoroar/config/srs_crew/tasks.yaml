define_foundation_task:
  description: >
    1. Perform a deep analysis of the user requirements from the prompt: '{prompt}'.
    2. Identify the core vision and define the project scope.
    3. Extract the list of technical entities including: Actors (users), Actions (primary operations), and Constraints (system limitations or rules).
    4. Draft an initial set of Functional and Non-functional requirements.
    5. Important: Do not introduce or assume requirements that are not explicitly present in the prompt.
  expected_output: >
    A complete SRSReport object containing a Markdown-formatted report along with structured metadata that includes the lists of Actors, Actions, and Constraints.

  agent: discovery_and_drafting_agent

